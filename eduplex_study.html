<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>학습 관리 — 행당 에듀플렉스</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <style>
    :root{
      --navy:#1a2a5e;--navy-mid:#2c3e7a;--gold:#b8960c;--gold-btn:#c9a227;
      --white:#fff;--bg:#f8f9fc;--bg2:#eef0f7;
      --text:#1a1a2e;--text-sub:#555e7a;--text-light:#8892aa;
      --border:#dde2f0;--shadow:0 2px 16px rgba(26,42,94,.08);--shadow-hover:0 8px 32px rgba(26,42,94,.16);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;}
    a{color:inherit;text-decoration:none;}

    .topbar{background:var(--navy);color:rgba(255,255,255,.7);font-size:12px;padding:7px 24px;display:flex;justify-content:space-between;align-items:center;}
    .topbar a{color:rgba(255,255,255,.7);margin-left:12px;}
    .topbar a:hover{color:#fff;}

    .page-header{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;height:56px;gap:14px;box-shadow:0 2px 8px rgba(26,42,94,.06);}
    .logo-box{width:36px;height:36px;background:var(--navy);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .logo-box svg{width:22px;height:22px;}
    .page-header h1{font-size:16px;font-weight:700;color:var(--navy);}
    .back-link{margin-left:auto;font-size:13px;color:var(--text-sub);font-weight:500;}
    .back-link:hover{color:var(--navy);}

    .tab-bar{background:var(--white);border-bottom:2px solid var(--border);padding:0 24px;display:flex;}
    .tab-btn{padding:14px 22px;font-size:14px;font-weight:600;color:var(--text-light);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;}
    .tab-btn:hover{color:var(--navy);}
    .tab-btn.active{color:var(--navy);border-bottom-color:var(--gold-btn);}

    .page-content{max-width:1100px;margin:0 auto;padding:36px 24px;}
    .tab-panel{display:none;}
    .tab-panel.active{display:block;}

    /* 시험지 분석 */
    .exam-layout{display:grid;grid-template-columns:210px 1fr;gap:24px;}
    @media(max-width:700px){.exam-layout{grid-template-columns:1fr;}}
    .exam-sidebar{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:20px;box-shadow:var(--shadow);}
    .exam-year-lbl{font-size:13px;font-weight:700;color:var(--gold-btn);margin-bottom:12px;}
    .exam-menu{list-style:none;}
    .exam-menu li{margin-bottom:2px;}
    .exam-menu a{display:block;padding:10px 14px;border-radius:8px;font-size:13.5px;color:var(--text-sub);transition:background .15s;}
    .exam-menu a:hover{background:var(--bg2);color:var(--navy);}
    .exam-menu a.active{background:var(--navy);color:#fff;font-weight:700;}
    .exam-main{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:26px;box-shadow:var(--shadow);}
    .exam-main h3{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:700;color:var(--navy);margin-bottom:6px;border-bottom:2px solid var(--border);padding-bottom:14px;}

    /* 게시글 목록 */
    .post-list{list-style:none;margin-top:8px;}
    .post-empty{font-size:13px;color:var(--text-light);padding:20px 0;}
    .post-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);}
    .post-item:last-child{border-bottom:none;}
    .post-num{width:26px;text-align:center;font-size:12px;color:var(--text-light);flex-shrink:0;}
    .post-title-btn{font-size:14px;color:var(--text);flex:1;background:none;border:none;text-align:left;cursor:pointer;padding:0;font-family:inherit;}
    .post-title-btn:hover{color:var(--navy);}
    .post-date{font-size:12px;color:var(--text-light);flex-shrink:0;}
    /* 수정/삭제 버튼 */
    .post-edit-btn{background:none;border:1px solid var(--border);color:var(--text-sub);font-size:11px;padding:3px 9px;border-radius:5px;cursor:pointer;flex-shrink:0;}
    .post-edit-btn:hover{border-color:var(--navy);color:var(--navy);}
    .post-del-btn{background:none;border:none;color:var(--text-light);font-size:13px;cursor:pointer;padding:2px 6px;flex-shrink:0;border-radius:4px;}
    .post-del-btn:hover{color:#dc2626;background:#fee2e2;}
    .write-btn{margin-top:18px;display:inline-flex;align-items:center;gap:6px;background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-size:13.5px;font-weight:600;border:none;cursor:pointer;transition:background .2s;}
    .write-btn:hover{background:var(--navy-mid);}

    /* ── 편집 권한 제어 ── */
    .write-btn,.post-edit-btn,.post-del-btn,.post-img-del,.hof-del-btn,.iv-del-btn,.add-btn{display:none!important;}
    body.can-edit .write-btn,body.can-edit .post-edit-btn,body.can-edit .post-del-btn{display:inline-flex!important;}
    body.can-edit .post-img-del{display:block!important;}
    body.can-edit .hof-del-btn{display:block!important;opacity:0;transition:opacity .15s;}
    body.can-edit .hof-item:hover .hof-del-btn{opacity:1!important;}
    body.can-edit .iv-del-btn{display:block!important;opacity:0;transition:opacity .15s;}
    body.can-edit .iv-card:hover .iv-del-btn{opacity:1!important;}
    body.can-edit .add-btn{display:inline-flex!important;}
    body:not(.can-edit) .btn-edit-post{display:none!important;}

    /* 상세보기 이미지 */
    .post-img-gallery{display:flex;flex-direction:column;gap:14px;margin-bottom:16px;}
    .post-img-wrap{position:relative;border-radius:10px;overflow:hidden;border:1px solid var(--border);}
    .post-img-wrap img{width:100%;display:block;cursor:zoom-in;}
    .post-img-del{position:absolute;top:8px;right:8px;background:rgba(220,38,38,.9);color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;}
    .post-img-del:hover{background:#b91c1c;}

    /* 명예의 전당 */
    .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}
    .section-header h2{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:700;color:var(--navy);}
    .section-header p{font-size:13px;color:var(--text-sub);margin-top:4px;}
    .add-btn{display:inline-flex;align-items:center;gap:6px;background:var(--navy);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:background .2s;white-space:nowrap;}
    .add-btn:hover{background:var(--navy-mid);}
    .hof-empty{font-size:14px;color:var(--text-light);padding:40px 0;text-align:center;}
    .hof-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
    @media(max-width:700px){.hof-grid{grid-template-columns:1fr;}}
    .hof-item{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);position:relative;}
    .hof-item img{width:100%;display:block;}
    .hof-del-btn{position:absolute;top:8px;right:8px;background:rgba(220,38,38,.88);color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;opacity:0;transition:opacity .15s;}
    .hof-item:hover .hof-del-btn{opacity:1;}

    /* 인터뷰 */
    .iv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
    @media(max-width:700px){.iv-grid{grid-template-columns:1fr;}}
    .iv-card{border:1px solid var(--border);border-radius:12px;padding:22px;display:block;text-decoration:none;color:var(--text);transition:all .2s;box-shadow:var(--shadow);position:relative;}
    .iv-card:hover{border-color:var(--navy);transform:translateY(-3px);box-shadow:var(--shadow-hover);}
    .iv-icon{font-size:26px;margin-bottom:10px;}
    .iv-card h4{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:6px;}
    .iv-card p{font-size:12px;color:var(--text-sub);}
    /* 카드 순서별 배경색 — 연한 파스텔 */
    .iv-card:nth-child(1){background:#e8f0fe;}
    .iv-card:nth-child(2){background:#e8f5e9;}
    .iv-card:nth-child(3){background:#fff3e0;}
    .iv-card:nth-child(4){background:#fce4ec;}
    .iv-card:nth-child(5){background:#f3e5f5;}
    .iv-card:nth-child(6){background:#e0f7fa;}
    .iv-card:nth-child(7){background:#f9fbe7;}
    .iv-card:nth-child(8){background:#fbe9e7;}
    .iv-card:nth-child(9){background:#e8eaf6;}
    .iv-card:nth-child(10){background:#e0f2f1;}
    .iv-del-btn{position:absolute;top:10px;right:10px;background:none;border:1px solid var(--border);color:var(--text-light);border-radius:5px;padding:3px 8px;font-size:11px;cursor:pointer;opacity:0;transition:opacity .15s;}
    .iv-card:hover .iv-del-btn{opacity:1;}
    .iv-del-btn:hover{background:#fee2e2;border-color:#dc2626;color:#dc2626;}

    /* 모달 공통 */
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:2000;align-items:center;justify-content:center;}
    .modal-bg.open{display:flex;}
    .modal-box{background:var(--white);border-radius:16px;padding:28px;width:90%;max-width:580px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.22);}
    .modal-box h2{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:18px;}
    .mf{margin-bottom:14px;}
    .mf label{display:block;font-size:12px;font-weight:600;color:var(--text-sub);margin-bottom:5px;}
    .mf input,.mf textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13.5px;color:var(--text);font-family:inherit;resize:vertical;background:var(--white);}
    .mf textarea{min-height:100px;}
    .mf input:focus,.mf textarea:focus{outline:none;border-color:var(--navy);}
    .m-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:14px;}
    .m-cancel{padding:9px 16px;background:var(--bg);border:1px solid var(--border);color:var(--text-sub);border-radius:7px;font-size:13px;cursor:pointer;}
    .m-save{padding:9px 18px;background:var(--navy);color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;}
    .m-save:hover{background:var(--navy-mid);}

    /* 이미지 URL 행 */
    .img-url-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;}
    .img-url-row input{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--text);font-family:inherit;background:var(--white);}
    .img-url-row input:focus{outline:none;border-color:var(--navy);}
    .img-url-remove{background:none;border:1px solid var(--border);color:var(--text-light);border-radius:6px;padding:7px 10px;cursor:pointer;font-size:13px;flex-shrink:0;}
    .img-url-remove:hover{background:#fee2e2;border-color:#dc2626;color:#dc2626;}
    .add-img-url-btn{display:inline-flex;align-items:center;gap:5px;background:var(--bg2);border:1.5px dashed var(--border);color:var(--navy);border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;margin-top:4px;font-family:inherit;}
    .add-img-url-btn:hover{border-color:var(--navy);background:var(--bg);}

    /* 상세보기 모달 (더 넓게) */
    .detail-modal-box{background:var(--white);border-radius:16px;padding:28px;width:95%;max-width:820px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.22);}
    .detail-modal-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px;}
    .detail-modal-hdr h2{font-size:19px;font-weight:700;color:var(--navy);margin:0;flex:1;}
    .detail-hdr-btns{display:flex;gap:8px;align-items:center;flex-shrink:0;}
    .btn-fullscreen{display:inline-flex;align-items:center;gap:5px;background:var(--bg2);border:1px solid var(--border);color:var(--text-sub);padding:7px 13px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
    .btn-fullscreen:hover{background:var(--navy);color:#fff;border-color:var(--navy);}
    .btn-edit-post{display:inline-flex;align-items:center;gap:5px;background:var(--bg2);border:1px solid var(--border);color:var(--navy);padding:7px 13px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
    .btn-edit-post:hover{background:var(--navy);color:#fff;border-color:var(--navy);}
    .btn-close-detail{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-light);padding:4px;}
    .btn-close-detail:hover{color:var(--text);}
    .detail-body-text{font-size:14px;color:var(--text-sub);line-height:1.9;white-space:pre-wrap;background:var(--bg);border-radius:8px;padding:14px;margin-bottom:14px;}

    /* 전체화면 뷰어 */
    .fullscreen-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:3000;flex-direction:column;align-items:center;justify-content:flex-start;overflow-y:auto;padding:20px;}
    .fullscreen-bg.open{display:flex;}
    .fullscreen-hdr{width:100%;max-width:900px;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-shrink:0;}
    .fullscreen-title{font-size:16px;font-weight:700;color:#fff;}
    .btn-close-fullscreen{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;}
    .btn-close-fullscreen:hover{background:rgba(255,255,255,.22);}
    .fullscreen-imgs{width:100%;max-width:900px;display:flex;flex-direction:column;gap:16px;}
    .fullscreen-imgs img{width:100%;border-radius:8px;display:block;}
  </style>
</head>
<body>

<div class="topbar">
  <span>행당 에듀플렉스 · 학습 관리</span>
  <div><a href="https://blog.naver.com/dpeblee" target="_blank">📝 블로그</a><a href="tel:02-6949-1672">📞 02-6949-1672</a></div>
</div>

<div class="page-header">
  <h1>학습 관리</h1>
  <a class="back-link" href="eduplex_main.html">← 홈페이지로</a>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab(this,'exam')">📊 시험지 분석</button>
  <button class="tab-btn" onclick="switchTab(this,'hof')">🏆 명예의 전당</button>
  <button class="tab-btn" onclick="switchTab(this,'interview')">🎤 인터뷰</button>
</div>

<div class="page-content">

  <!-- 시험지 분석 -->
  <div class="tab-panel active" id="panel-exam">
    <div class="exam-layout">
      <div class="exam-sidebar">
        <div class="exam-year-lbl">📅 2026년</div>
        <ul class="exam-menu">
          <li><a href="#" class="active" onclick="switchExam(this,'mid1');return false;">1학기 중간고사</a></li>
          <li><a href="#" onclick="switchExam(this,'fin1');return false;">1학기 기말고사</a></li>
          <li><a href="#" onclick="switchExam(this,'mid2');return false;">2학기 중간고사</a></li>
          <li><a href="#" onclick="switchExam(this,'fin2');return false;">2학기 기말고사</a></li>
        </ul>
      </div>
      <div class="exam-main">
        <h3 id="examTitle">2026 · 1학기 중간고사</h3>
        <ul class="post-list" id="postList">
          <li class="post-empty">아직 게시글이 없습니다. 아래 버튼으로 게시글을 추가하세요.</li>
        </ul>
        <button class="write-btn" onclick="openWriteModal()">✏️ 게시글 작성</button>
      </div>
    </div>
  </div>

  <!-- 명예의 전당 -->
  <div class="tab-panel" id="panel-hof">
    <div class="section-header">
      <div><h2>🏆 명예의 전당</h2></div>
      <button class="add-btn" onclick="openHofModal()">＋ 이미지 추가</button>
    </div>
    <div id="hofArea">
      <div class="hof-empty" id="hofEmpty">아직 추가된 이미지가 없습니다. 위 버튼으로 추가하세요.</div>
      <div class="hof-grid" id="hofGrid"></div>
    </div>
  </div>

  <!-- 인터뷰 -->
  <div class="tab-panel" id="panel-interview">
    <div class="section-header">
      <div><h2>🎤 인터뷰</h2></div>
      <button class="add-btn" onclick="openIvModal()">＋ 인터뷰 추가</button>
    </div>
    <div class="iv-grid" id="ivGrid">
      <div class="iv-card" style="opacity:.4;pointer-events:none;">
        <div class="iv-icon">🎤</div>
        <h4>인터뷰 게시글 제목</h4>
        <p>위 버튼으로 블로그 인터뷰 링크를 추가하세요.</p>
      </div>
    </div>
  </div>
</div>

<!-- ── 게시글 작성/수정 모달 ── -->
<div class="modal-bg" id="writeModal">
  <div class="modal-box">
    <h2 id="writeModalTitle">✏️ 게시글 작성</h2>
    <div class="mf">
      <label>제목</label>
      <input type="text" id="postTitleInput" placeholder="게시글 제목">
    </div>
    <div class="mf">
      <label>본문 (선택)</label>
      <textarea id="postBodyInput" placeholder="본문 내용을 입력하세요 (선택사항)"></textarea>
    </div>
    <div class="mf">
      <label>이미지 URL <span style="font-weight:400;color:var(--text-light);">— 여러 개 추가 가능</span></label>
      <div id="imgUrlList"></div>
      <button class="add-img-url-btn" type="button" onclick="addImgUrlRow()">＋ 이미지 URL 추가</button>
    </div>
    <div class="m-actions">
      <button class="m-cancel" onclick="closeWriteModal()">취소</button>
      <button class="m-save" id="writeModalSaveBtn" onclick="savePost()">💾 저장</button>
    </div>
  </div>
</div>

<!-- ── 게시글 상세보기 모달 ── -->
<div class="modal-bg" id="postDetailModal">
  <div class="detail-modal-box">
    <div class="detail-modal-hdr">
      <h2 id="detailTitle"></h2>
      <div class="detail-hdr-btns">
        <button class="btn-fullscreen" onclick="openFullscreen()">⛶ 전체화면</button>
        <button class="btn-edit-post" onclick="openEditModal()">✏️ 수정</button>
        <button class="btn-close-detail" onclick="closeDetailModal()">✕</button>
      </div>
    </div>
    <div class="detail-body-text" id="detailBody"></div>
    <div class="post-img-gallery" id="detailImgGallery"></div>
    <div class="m-actions">
      <button class="m-cancel" onclick="closeDetailModal()">닫기</button>
    </div>
  </div>
</div>

<!-- ── 전체화면 뷰어 ── -->
<div class="fullscreen-bg" id="fullscreenView">
  <div class="fullscreen-hdr">
    <div class="fullscreen-title" id="fullscreenTitle"></div>
    <button class="btn-close-fullscreen" onclick="closeFullscreen()">✕ 닫기</button>
  </div>
  <div class="fullscreen-imgs" id="fullscreenImgs"></div>
</div>

<!-- ── 명예의 전당 이미지 추가 ── -->
<div class="modal-bg" id="hofModal">
  <div class="modal-box">
    <h2>🖼️ 명예의 전당 이미지 추가</h2>
    <div class="mf"><label>이미지 URL</label><input type="text" id="hofImg" placeholder="https://..."></div>
    <div class="mf"><label>클릭 시 이동할 링크 (선택)</label><input type="text" id="hofLink" placeholder="https://blog.naver.com/..."></div>
    <div class="m-actions">
      <button class="m-cancel" onclick="closeHofModal()">취소</button>
      <button class="m-save" onclick="saveHof()">✅ 추가</button>
    </div>
  </div>
</div>

<!-- ── 인터뷰 추가 ── -->
<div class="modal-bg" id="ivModal">
  <div class="modal-box">
    <h2>🎤 인터뷰 추가</h2>
    <div class="mf"><label>게시글 제목</label><input type="text" id="ivTitle" placeholder="블로그 게시글 제목"></div>
    <div class="mf"><label>블로그 링크 URL</label><input type="text" id="ivLink" placeholder="https://blog.naver.com/..."></div>
    <div class="m-actions">
      <button class="m-cancel" onclick="closeIvModal()">취소</button>
      <button class="m-save" onclick="saveIv()">✅ 추가</button>
    </div>
  </div>
</div>

<script>
/* ── Firebase 초기화 ── */
const DB_URL = 'https://hdeduplex-homepage-default-rtdb.asia-southeast1.firebasedatabase.app/';
const fbApp = firebase.initializeApp({ databaseURL: DB_URL });
const db = firebase.database(fbApp);

/* ── Firebase 전체 데이터 로드 ── */
function loadAllData(){
  db.ref('study').on('value', snap => {
    const val = snap.val() || {};

    // 시험지 분석 게시글
    if(val.posts){
      Object.keys(EP).forEach(k => {
        EP[k] = val.posts[k] || [];
      });
      renderPosts();
    }

    // 명예의 전당
    if(val.hof && val.hof.length){
      const grid = document.getElementById('hofGrid');
      grid.innerHTML = '';
      document.getElementById('hofEmpty').style.display = 'none';
      val.hof.forEach((item, idx) => {
        const el = document.createElement('div');
        el.className = 'hof-item';
        el.innerHTML = `
          ${item.link
            ? `<a href="${item.link}" target="_blank"><img src="${item.img}" alt="명예의 전당"></a>`
            : `<img src="${item.img}" alt="명예의 전당">`}
          <button class="hof-del-btn" onclick="deleteHofItem(this, ${idx})">✕ 삭제</button>`;
        grid.appendChild(el);
      });
      hofData = val.hof;
    }

    // 인터뷰
    if(val.interviews && val.interviews.length){
      const grid = document.getElementById('ivGrid');
      // 빈 카드 제거
      const empty = grid.querySelector('[style*="pointer-events:none"]');
      if(empty) empty.remove();
      grid.innerHTML = '';
      val.interviews.forEach((item, idx) => {
        const card = document.createElement('a');
        card.className = 'iv-card';
        card.href = item.link || '#';
        card.target = '_blank';
        card.innerHTML = `
          <button class="iv-del-btn" onclick="event.preventDefault();event.stopPropagation();deleteIvCard(this, ${idx})">✕ 삭제</button>
          <div class="iv-icon">🎤</div>
          <h4>${esc(item.title)}</h4>
          <p>클릭하면 블로그로 이동합니다.</p>`;
        grid.appendChild(card);
      });
      ivData = val.interviews;
    }
  });
}

/* HOF/인터뷰 데이터 배열 (Firebase 동기화용) */
let hofData = [];
let ivData = [];

/* ── 편집 권한 인증 ── */
const STUDY_PW = '1672hd';

function checkEditAuth(){
  const p = new URLSearchParams(location.search);
  if(p.get('admin') === STUDY_PW){
    document.body.classList.add('can-edit');
  }
}

function requestAuth(){
  if(document.body.classList.contains('can-edit')) return true;
  const pw = prompt('편집 비밀번호를 입력하세요:');
  if(pw === STUDY_PW){
    document.body.classList.add('can-edit');
    showToast('✓ 편집 모드가 활성화되었습니다.');
    return true;
  } else if(pw !== null){
    showToast('⚠ 비밀번호가 올바르지 않습니다.');
  }
  return false;
}

/* ── 탭 ── */
const urlTab = new URLSearchParams(location.search).get('tab');
if(urlTab){ const b = document.querySelector(`.tab-btn[onclick*="'${urlTab}'"]`); if(b) switchTab(b,urlTab); }

function switchTab(btn, id){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+id).classList.add('active');
}

/* ── 시험지 분석 ── */
const ET = { mid1:'2026 · 1학기 중간고사', fin1:'2026 · 1학기 기말고사', mid2:'2026 · 2학기 중간고사', fin2:'2026 · 2학기 기말고사' };
const EP = { mid1:[], fin1:[], mid2:[], fin2:[] };
let CE = 'mid1';

function switchExam(el, k){
  document.querySelectorAll('.exam-menu a').forEach(a=>a.classList.remove('active'));
  el.classList.add('active'); CE = k;
  document.getElementById('examTitle').textContent = ET[k];
  renderPosts();
}

function renderPosts(){
  const list = document.getElementById('postList');
  const posts = EP[CE];
  if(!posts.length){
    list.innerHTML = '<li class="post-empty">아직 게시글이 없습니다. 아래 버튼으로 게시글을 추가하세요.</li>';
    return;
  }
  list.innerHTML = posts.map((p,i) => `
    <li class="post-item">
      <span class="post-num">${i+1}</span>
      <button class="post-title-btn" onclick="openDetail(${i})">${esc(p.title)}</button>
      <span class="post-date">${p.date}</span>
      <button class="post-edit-btn" onclick="openEditModal(${i})" title="수정">✏️ 수정</button>
      <button class="post-del-btn" onclick="deletePost(${i})" title="삭제">✕</button>
    </li>`).join('');
}

function deletePost(i){
  if(!document.body.classList.contains('can-edit')){showToast('⚠ 편집 권한이 없습니다.');return;}
  if(!confirm('게시글을 삭제할까요?')) return;
  EP[CE].splice(i,1);
  renderPosts();
  db.ref('study/posts').set(EP).then(() => showToast('✓ 삭제되었습니다!'));
}

/* ── 게시글 작성 ── */
let editingIdx = null; // null = 새 작성, 숫자 = 수정

function openWriteModal(){
  if(!requestAuth()) return;
  editingIdx = null;
  document.getElementById('writeModalTitle').textContent = '✏️ 게시글 작성';
  document.getElementById('writeModalSaveBtn').textContent = '💾 저장';
  document.getElementById('postTitleInput').value = '';
  document.getElementById('postBodyInput').value = '';
  document.getElementById('imgUrlList').innerHTML = '';
  addImgUrlRow();
  document.getElementById('writeModal').classList.add('open');
}

function openEditModal(i){
  if(!requestAuth()) return;
  // 목록에서 수정 버튼 클릭 OR 상세보기에서 수정 버튼 클릭
  const idx = (i !== undefined) ? i : currentDetailIdx;
  if(idx === null || idx === undefined) return;
  editingIdx = idx;
  const p = EP[CE][idx];

  document.getElementById('writeModalTitle').textContent = '✏️ 게시글 수정';
  document.getElementById('writeModalSaveBtn').textContent = '💾 수정 저장';
  document.getElementById('postTitleInput').value = p.title;
  document.getElementById('postBodyInput').value = p.body || '';

  // 기존 이미지 URL 채우기
  document.getElementById('imgUrlList').innerHTML = '';
  if(p.imgs && p.imgs.length){
    p.imgs.forEach(url => {
      addImgUrlRow(url);
    });
  } else {
    addImgUrlRow();
  }

  // 상세보기가 열려있으면 닫기
  document.getElementById('postDetailModal').classList.remove('open');
  document.getElementById('writeModal').classList.add('open');
}

function closeWriteModal(){
  document.getElementById('writeModal').classList.remove('open');
  editingIdx = null;
}

function addImgUrlRow(val=''){
  const list = document.getElementById('imgUrlList');
  const row = document.createElement('div');
  row.className = 'img-url-row';
  row.innerHTML = `
    <input type="text" placeholder="https://... (이미지 URL)" value="${val}">
    <button class="img-url-remove" onclick="this.closest('.img-url-row').remove()" title="삭제">✕</button>`;
  list.appendChild(row);
}

function savePost(){
  const t = document.getElementById('postTitleInput').value.trim();
  const b = document.getElementById('postBodyInput').value.trim();
  if(!t){ alert('제목을 입력하세요.'); return; }

  const imgs = [];
  document.querySelectorAll('#imgUrlList .img-url-row input').forEach(inp => {
    const v = inp.value.trim();
    if(v) imgs.push(v);
  });

  if(editingIdx !== null){
    EP[CE][editingIdx] = { ...EP[CE][editingIdx], title:t, body:b, imgs };
  } else {
    EP[CE].push({ title:t, body:b, imgs, date:new Date().toLocaleDateString('ko-KR') });
  }
  renderPosts();
  closeWriteModal();
  // Firebase 저장
  db.ref('study/posts').set(EP).then(() => showToast('✓ 저장되었습니다!'))
    .catch(e => showToast('⚠ 저장 실패: ' + e.message));
}

/* ── 게시글 상세보기 ── */
let currentDetailIdx = null;

function openDetail(i){
  const p = EP[CE][i];
  currentDetailIdx = i;
  document.getElementById('detailTitle').textContent = p.title;

  const bodyEl = document.getElementById('detailBody');
  if(p.body){ bodyEl.textContent = p.body; bodyEl.style.display='block'; }
  else { bodyEl.style.display='none'; }

  renderDetailImgs(i);
  document.getElementById('postDetailModal').classList.add('open');
}

function renderDetailImgs(i){
  const p = EP[CE][i];
  const gallery = document.getElementById('detailImgGallery');
  if(!p.imgs || !p.imgs.length){ gallery.innerHTML=''; return; }
  gallery.innerHTML = p.imgs.map((url,j) => `
    <div class="post-img-wrap">
      <img src="${url}" alt="시험지 이미지 ${j+1}" onerror="this.style.display='none'" onclick="openImgFullscreen('${url}')">
      <button class="post-img-del" onclick="deleteDetailImg(${i},${j})">✕ 삭제</button>
    </div>`).join('');
}

function deleteDetailImg(postIdx, imgIdx){
  if(!document.body.classList.contains('can-edit')){showToast('⚠ 편집 권한이 없습니다.');return;}
  if(!confirm('이미지를 삭제할까요?')) return;
  EP[CE][postIdx].imgs.splice(imgIdx,1);
  renderDetailImgs(postIdx);
  db.ref('study/posts').set(EP).then(() => showToast('✓ 이미지 삭제됨'));
}

function closeDetailModal(){
  document.getElementById('postDetailModal').classList.remove('open');
  currentDetailIdx = null;
}

/* ── 전체화면 뷰어 ── */
function openFullscreen(){
  const i = currentDetailIdx;
  if(i === null) return;
  const p = EP[CE][i];
  document.getElementById('fullscreenTitle').textContent = p.title;

  const imgs = document.getElementById('fullscreenImgs');
  if(!p.imgs || !p.imgs.length){
    imgs.innerHTML = '<p style="color:rgba(255,255,255,.5);text-align:center;padding:40px;">이미지가 없습니다.</p>';
  } else {
    imgs.innerHTML = p.imgs.map(url =>
      `<img src="${url}" alt="시험지" onerror="this.style.display='none'">`).join('');
  }
  document.getElementById('fullscreenView').classList.add('open');
  document.body.style.overflow = 'hidden';
}

// 이미지 단일 전체화면 (이미지 클릭 시)
function openImgFullscreen(url){
  document.getElementById('fullscreenTitle').textContent = '이미지 전체보기';
  document.getElementById('fullscreenImgs').innerHTML = `<img src="${url}" alt="시험지">`;
  document.getElementById('fullscreenView').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeFullscreen(){
  document.getElementById('fullscreenView').classList.remove('open');
  document.body.style.overflow = '';
}

// ESC 키로 닫기
document.addEventListener('keydown', e => {
  if(e.key === 'Escape'){
    closeFullscreen();
    closeDetailModal();
  }
});

/* ── 명예의 전당 ── */
function openHofModal(){ if(!requestAuth()) return; document.getElementById('hofModal').classList.add('open'); }
function closeHofModal(){ document.getElementById('hofModal').classList.remove('open'); }
function saveHof(){
  const img = document.getElementById('hofImg').value.trim();
  const link = document.getElementById('hofLink').value.trim();
  if(!img){ alert('이미지 URL을 입력하세요.'); return; }
  hofData.push({ img, link });
  renderHof();
  closeHofModal();
  document.getElementById('hofImg').value = '';
  document.getElementById('hofLink').value = '';
  db.ref('study/hof').set(hofData).then(() => showToast('✓ 저장되었습니다!'))
    .catch(e => showToast('⚠ 저장 실패: ' + e.message));
}

function renderHof(){
  const grid = document.getElementById('hofGrid');
  grid.innerHTML = '';
  if(!hofData.length){
    document.getElementById('hofEmpty').style.display = 'block';
    return;
  }
  document.getElementById('hofEmpty').style.display = 'none';
  hofData.forEach((item, idx) => {
    const el = document.createElement('div');
    el.className = 'hof-item';
    el.innerHTML = `
      ${item.link
        ? `<a href="${item.link}" target="_blank"><img src="${item.img}" alt="명예의 전당"></a>`
        : `<img src="${item.img}" alt="명예의 전당">`}
      <button class="hof-del-btn" onclick="deleteHofItem(this, ${idx})">✕ 삭제</button>`;
    grid.appendChild(el);
  });
}

function deleteHofItem(btn, idx){
  if(!document.body.classList.contains('can-edit')){showToast('⚠ 편집 권한이 없습니다.');return;}
  if(!confirm('이미지를 삭제할까요?')) return;
  hofData.splice(idx, 1);
  renderHof();
  db.ref('study/hof').set(hofData).then(() => showToast('✓ 삭제되었습니다!'));
}

/* ── 인터뷰 ── */
function openIvModal(){ if(!requestAuth()) return; document.getElementById('ivModal').classList.add('open'); }
function closeIvModal(){ document.getElementById('ivModal').classList.remove('open'); }
function saveIv(){
  const title = document.getElementById('ivTitle').value.trim();
  const link  = document.getElementById('ivLink').value.trim();
  if(!title){ alert('제목을 입력하세요.'); return; }
  ivData.push({ title, link });
  renderIv();
  closeIvModal();
  document.getElementById('ivTitle').value = '';
  document.getElementById('ivLink').value = '';
  db.ref('study/interviews').set(ivData).then(() => showToast('✓ 저장되었습니다!'))
    .catch(e => showToast('⚠ 저장 실패: ' + e.message));
}

function renderIv(){
  const grid = document.getElementById('ivGrid');
  grid.innerHTML = '';
  if(!ivData.length){
    grid.innerHTML = `<div class="iv-card" style="opacity:.4;pointer-events:none;"><div class="iv-icon">🎤</div><h4>인터뷰 게시글 제목</h4><p>위 버튼으로 블로그 인터뷰 링크를 추가하세요.</p></div>`;
    return;
  }
  ivData.forEach((item, idx) => {
    const card = document.createElement('a');
    card.className = 'iv-card';
    card.href = item.link || '#';
    card.target = '_blank';
    card.innerHTML = `
      <button class="iv-del-btn" onclick="event.preventDefault();event.stopPropagation();deleteIvCard(this, ${idx})">✕ 삭제</button>
      <div class="iv-icon">🎤</div>
      <h4>${esc(item.title)}</h4>
      <p>클릭하면 블로그로 이동합니다.</p>`;
    grid.appendChild(card);
  });
}

function deleteIvCard(btn, idx){
  if(!document.body.classList.contains('can-edit')){showToast('⚠ 편집 권한이 없습니다.');return;}
  if(!confirm('인터뷰 카드를 삭제할까요?')) return;
  ivData.splice(idx, 1);
  renderIv();
  db.ref('study/interviews').set(ivData).then(() => showToast('✓ 삭제되었습니다!'));
}

/* ── 유틸 ── */
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showToast(msg){
  let t = document.getElementById('studyToast');
  if(!t){
    t = document.createElement('div');
    t.id = 'studyToast';
    t.style.cssText = 'position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1a2a5e;color:#fff;font-size:13px;font-weight:600;padding:10px 20px;border-radius:20px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:9999;white-space:nowrap;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._t);
  t._t = setTimeout(() => t.style.opacity = '0', 2500);
}

/* ── 초기 로드 ── */
checkEditAuth();
loadAllData();
</script>
</body>
</html>
